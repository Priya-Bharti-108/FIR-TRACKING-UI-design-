<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Online Police FIR Tracking System - Register</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="home.css">
    <link rel="stylesheet" href="register.css">
</head>
<body>
    <div class="app-container">
        <!-- Top area -->
        <div class="top-bar">
            <a href="home.html" class="back-btn">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="back-icon">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M10.5 19.5L3 12m0 0l7.5-7.5M3 12h18" />
                </svg>
            </a>
            <div class="bar-title">
                <svg viewBox="0 0 100 120" fill="none" class="small-badge" xmlns="http://www.w3.org/2000/svg">
                    <path d="M50 0L90 15V50C90 80 50 115 50 120C50 115 10 80 10 50V15L50 0Z" fill="#1e3a8a"/>
                </svg>
                <span>Citizen Police</span>
            </div>
            <div class="placeholder-icon"></div>
        </div>

        <main class="register-main">
            <div class="register-header">
                <h2>Register New FIR</h2>
                <p>Submit an official First Information Report (FIR) below. Please ensure all details are accurate.</p>
            </div>

            <form class="register-form" id="registerForm">
                <div class="form-group">
                    <label>Incident Subject</label>
                    <input type="text" placeholder="Enter the type of incident, e.g., Theft, Assault" required>
                </div>

                <div class="form-group inline-group">
                    <label>Date & Time</label>
                    <div class="datetime-display">Oct 26, 2023, 11:30 AM</div>
                    <div class="input-with-icons">
                        <input type="text" placeholder="Select Date & Time">
                        <div class="input-icons">
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="icon"><path stroke-linecap="round" stroke-linejoin="round" d="M6.75 3v2.25M17.25 3v2.25M3 18.75V7.5a2.25 2.25 0 012.25-2.25h13.5A2.25 2.25 0 0121 7.5v11.25m-18 0A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75m-18 0v-7.5A2.25 2.25 0 015.25 9h13.5A2.25 2.25 0 0121 11.25v7.5" /></svg>
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="icon"><path stroke-linecap="round" stroke-linejoin="round" d="M12 6v6h4.5m4.5 0a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
                        </div>
                    </div>
                </div>

                <div class="form-group">
                    <label>Incident Location</label>
                    <div class="location-top">123 Main St, Springfield</div>
                    <div class="input-with-icons">
                        <input type="text" placeholder="Enter address or use GPS">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="icon right-icon"><path stroke-linecap="round" stroke-linejoin="round" d="M15 10.5a3 3 0 11-6 0 3 3 0 016 0z" /><path stroke-linecap="round" stroke-linejoin="round" d="M19.5 10.5c0 7.142-7.5 11.25-7.5 11.25S4.5 17.642 4.5 10.5a7.5 7.5 0 1115 0z" /></svg>
                    </div>
                    <!-- Mock Map -->
                    <div class="mock-map">
                        <div class="map-pin"></div>
                    </div>
                </div>

                <div class="form-group">
                    <label>Incident Details</label>
                    <textarea placeholder="Describe the incident thoroughly (date, time, what happened, who was involved)..." rows="4"></textarea>
                    <div class="char-count">0 / 1000</div>
                </div>

                <div class="form-group">
                    <label>Upload Evidence <span>(Optional)</span></label>
                    <div class="upload-zone">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="upload-icon"><path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5m-13.5-9L12 3m0 0l4.5 4.5M12 3v13.5" /></svg>
                        <div class="upload-text">+ Upload Files</div>
                        <div class="upload-sub">Supports Images, Videos, Documents (Max 10MB)</div>
                    </div>
                </div>
            </form>
        </main>
        
        <div class="bottom-action-bar">
            <button type="submit" form="registerForm" class="submit-fir-btn">
                Submit FIR
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="btn-icon"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75L11.25 15 15 9.75M21 12c0 1.268-.63 2.39-1.593 3.068a3.745 3.745 0 01-1.043 3.296 3.745 3.745 0 01-3.296 1.043A3.745 3.745 0 0112 21c-1.268 0-2.39-.63-3.068-1.593a3.746 3.746 0 01-3.296-1.043 3.745 3.745 0 01-1.043-3.296A3.745 3.745 0 013 12c0-1.268.63-2.39 1.593-3.068a3.745 3.745 0 011.043-3.296 3.746 3.746 0 013.296-1.043A3.746 3.746 0 0112 3c1.268 0 2.39.63 3.068 1.593a3.746 3.746 0 013.296 1.043 3.746 3.746 0 011.043 3.296A3.745 3.745 0 0121 12z" /></svg>
            </button>
        </div>
    </div>
    
    <script>
        document.getElementById('registerForm').addEventListener('submit', function(e) {
            e.preventDefault();
            // Simulate processing and navigate to track
            const btn = document.querySelector('.submit-fir-btn');
            btn.innerHTML = 'Submitting...';
            setTimeout(() => {
                alert('FIR Submitted Successfully!');
                window.location.href = 'track.html';
            }, 1000);
        });
    </script>
</body>
</html>
