<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Online Police FIR Tracking System - Login</title>
    <!-- Preconnect to Google Fonts for performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- Logo and Title Area -->
        <header class="header">
            <img src="assets/police_logo.png" alt="Police Badge Logo" class="logo">
            <h1 class="title">ONLINE POLICE FIR<br>TRACKING SYSTEM</h1>
        </header>

        <!-- Login Card -->
        <main class="login-card">
            <h2 class="card-title">Login</h2>
            
            <form id="loginForm" class="login-form">
                <!-- Mobile Number Field -->
                <div class="input-group">
                    <label for="mobileNumber">Mobile Number</label>
                    <div class="input-wrapper">
                        <!-- Phone Icon -->
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="icon" aria-hidden="true">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M10.5 1.5H8.25A2.25 2.25 0 006 3.75v16.5a2.25 2.25 0 002.25 2.25h7.5A2.25 2.25 0 0018 20.25V3.75a2.25 2.25 0 00-2.25-2.25H13.5m-3 0V3h3V1.5m-3 0h3m-3 18.75h3" />
                        </svg>
                        <input type="tel" id="mobileNumber" name="mobileNumber" placeholder="Enter your mobile number" required minlength="10" maxlength="15">
                    </div>
                </div>

                <!-- Password Field -->
                <div class="input-group">
                    <label for="password">Password</label>
                    <div class="input-wrapper">
                        <!-- Lock Icon -->
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="icon" aria-hidden="true">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M16.5 10.5V6.75a4.5 4.5 0 10-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 002.25-2.25v-6.75a2.25 2.25 0 00-2.25-2.25H6.75a2.25 2.25 0 00-2.25 2.25v6.75a2.25 2.25 0 002.25 2.25z" />
                        </svg>
                        <input type="password" id="password" name="password" placeholder="Enter your password" required>
                        <button type="button" id="togglePassword" class="toggle-password" aria-label="Toggle password visibility">Show</button>
                    </div>
                </div>

                <!-- Submit Button -->
                <button type="submit" class="submit-btn" id="submitBtn">
                    <span>LOGIN</span>
                    <!-- Arrow Right Icon -->
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" class="btn-icon" aria-hidden="true">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M4.5 12h15m0 0l-6.75-6.75M19.5 12l-6.75 6.75" />
                    </svg>
                </button>

                <!-- Forgot Password -->
                <div class="forgot-password">
                    <a href="#">Forgot Password?</a>
                </div>
            </form>
        </main>

        <!-- Footer Text -->
        <footer class="footer">
            <p>First time user? <a href="#" class="register-link">Register Now</a></p>
        </footer>
    </div>
    <script src="script.js"></script>
</body>
</html>
